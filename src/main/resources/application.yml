spring.application.name: mall
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ecom_mail
    username: root
    password: 6582352
  # flyway 数据表历史版本管理
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    baseline-on-migrate: true

# JWT 配置
jwt:
  secret: XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX  # 生产环境请使用足够长的随机字符串
  expiration: 86400000  # Token 过期时间，单位毫秒，默认24小时

# mybatis-plus 日志（可选）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl